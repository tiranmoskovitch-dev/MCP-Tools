[project]
name = "mcp-vuln-manager"
version = "1.0.0"
description = "CVE tracking, asset inventory, patch prioritization, exploits"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project.scripts]
mcp-vuln-manager = "src.server:main"
