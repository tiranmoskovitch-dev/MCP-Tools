[project]
name = "mcp-siem"
version = "1.0.0"
description = "Threat detection, incident response, forensics, correlation rules"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project.scripts]
mcp-siem = "src.server:main"
